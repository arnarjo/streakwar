name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Typecheck, Lint, Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # Pre-existing baseline: ~42 errors / ~33 warnings in src/ (react-hooks v6
      # rules from eslint-config-expo flag established RN idioms). Non-blocking
      # until the baseline is burned down; remove continue-on-error afterwards.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Test
        run: npm test -- --ci
